repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --no-sync ruff check
        language: system
        pass_filenames: false
        always_run: true
      - id: ty-check
        name: ty check
        entry: uv run --no-sync ty check
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest (not slow)
        entry: uv run --no-sync pytest
        args: ["-m", "not slow"]
        language: system
        pass_filenames: false
        always_run: true
